<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Participants List - SmartEvent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg glass-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">SmartEvent</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-3">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link active" href="participants.html">Participants</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-container glass-panel my-5">
    <div class="text-center mb-5">
      <h2 class="mb-2">Participant Directory</h2>
      <p style="color: #9ca3af;">View all registered attendees and their associated events</p>
    </div>

    <div class="p-4" style="background: rgba(0,0,0,0.2); border-radius: 16px;">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>Participant Name</th>
              <th>Email Address</th>
              <th>Event Info</th>
            </tr>
          </thead>
          <tbody id="participantTable">
            <tr><td colspan="3" class="text-center py-4">Loading participants...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="ui.js"></script>
  <script src="participants.js"></script>
</body>
</html>
