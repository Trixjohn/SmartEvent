<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Participant - SmartEvent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg glass-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">SmartEvent</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
        <ul class="navbar-nav gap-3">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Events</a></li>
          <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
          <li class="nav-item"><a class="nav-link" href="participants.html">Participants</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="page-container glass-panel my-5" style="max-width: 600px;">
    <div class="text-center mb-5">
      <h2 class="mb-2">Register Participant</h2>
      <p style="color: #9ca3af;">Sign up a user for an upcoming event</p>
    </div>

    <div class="p-4" style="background: rgba(0,0,0,0.2); border-radius: 16px;">
      <div class="mb-4">
        <label class="form-label text-secondary small text-uppercase fw-bold">Full Name</label>
        <input id="name" class="form-control" placeholder="John Doe" />
      </div>
      
      <div class="mb-4">
        <label class="form-label text-secondary small text-uppercase fw-bold">Email Address</label>
        <input id="email" type="email" class="form-control" placeholder="john@example.com" />
      </div>
      
      <div class="mb-5">
        <label class="form-label text-secondary small text-uppercase fw-bold">Event ID</label>
        <input id="event_id" type="number" class="form-control" placeholder="e.g. 1" />
      </div>

      <button id="registerBtn" class="btn btn-success w-100 py-3" onclick="registerUser()">Complete Registration</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabaseClient.js"></script>
  <script src="ui.js"></script>
  <script src="register.js"></script>
</body>
</html>
