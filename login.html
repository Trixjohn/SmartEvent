<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login - SmartEvent</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>
<body>

  <div class="login-container glass-panel">
    <div class="text-center mb-4">
      <h2 class="mb-2">Welcome Back</h2>
      <p style="color: #9ca3af;">Login to SmartEvent to continue</p>
    </div>
    
    <input id="email" class="form-control mb-3" placeholder="Email Address">
    <input id="password" type="password" class="form-control mb-4" placeholder="Password">
    
    <button onclick="login()" class="btn btn-primary w-100 mb-3">Login to Dashboard</button>
    <div class="text-center mt-3">
      <span style="color: #9ca3af;">Don't have an account? </span>
      <button onclick="signup()" class="btn btn-link p-0 text-success" style="text-decoration: none; font-weight: 600;">Sign Up</button>
    </div>
  </div>

  <script src="supabaseClient.js"></script>
  <script src="ui.js"></script>
  <script>
  async function signup(){
    let email = document.getElementById("email").value
    let password = document.getElementById("password").value

    const { data, error } = await supabaseClient.auth.signUp({
      email, password
    })

    if(error) showToast(error.message, 'error')
    else showToast("Sign Up Successful! Please check your email.", 'success')
  }

  async function login(){
    let email = document.getElementById("email").value
    let password = document.getElementById("password").value

    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password })

    if(error) showToast(error.message, 'error')
    else {
      showToast("Login Successful!", 'success')
      setTimeout(() => { window.location.href = "index.html" }, 1500);
    }
  }
  </script>
</body>
</html>
